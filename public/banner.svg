<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="kingGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#fef3c7"/>
      <stop offset="45%"  stop-color="#f5e040"/>
      <stop offset="100%" stop-color="#b8900a"/>
    </linearGradient>
    <radialGradient id="bgRadial" cx="50%" cy="55%" r="52%">
      <stop offset="0%"   stop-color="#141108" stop-opacity="1"/>
      <stop offset="100%" stop-color="#080a0f" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="kingHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#f5e040" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#f5e040" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="#080a0f"/>
  <rect width="1200" height="400" fill="url(#bgRadial)"/>

  <!-- Ambient king glow -->
  <ellipse cx="600" cy="210" rx="210" ry="170" fill="url(#kingHalo)"/>
  <ellipse cx="600" cy="210" rx="340" ry="240" fill="#f5e040" fill-opacity="0.025"/>

  <!-- Border lines -->
  <line x1="0" y1="1"   x2="1200" y2="1"   stroke="#f5e040" stroke-opacity="0.12" stroke-width="1"/>
  <line x1="0" y1="399" x2="1200" y2="399" stroke="#f5e040" stroke-opacity="0.12" stroke-width="1"/>

  <!-- Horizontal rule either side of king -->
  <line x1="60"  y1="200" x2="480" y2="200" stroke="#f5e040" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="720" y1="200" x2="1140" y2="200" stroke="#f5e040" stroke-opacity="0.06" stroke-width="1"/>

