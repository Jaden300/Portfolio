<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <!-- Fade mask so helix dissolves at edges -->
    <linearGradient id="fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="white" stop-opacity="0"/>
      <stop offset="7%"   stop-color="white" stop-opacity="1"/>
      <stop offset="93%"  stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <mask id="m"><rect width="1200" height="400" fill="url(#fade)"/></mask>

    <!-- Strand gradients (colored per strand) -->
    <linearGradient id="sg1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#f5e040" stop-opacity="0"/>
      <stop offset="7%"   stop-color="#f5e040" stop-opacity="1"/>
      <stop offset="93%"  stop-color="#f5e040" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f5e040" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sg2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#fbbf24" stop-opacity="0"/>
      <stop offset="7%"   stop-color="#fbbf24" stop-opacity="1"/>
      <stop offset="93%"  stop-color="#fbbf24" stop-opacity="1"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dotglow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dotglow2" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="#080a0f"/>
  <!-- Subtle center ambient glow -->
  <ellipse cx="600" cy="200" rx="480" ry="180" fill="#f5e040" fill-opacity="0.025"/>

  <!-- Border lines -->
  <line x1="0" y1="1"   x2="1200" y2="1"   stroke="#f5e040" stroke-opacity="0.10" stroke-width="1"/>
  <line x1="0" y1="399" x2="1200" y2="399" stroke="#f5e040" stroke-opacity="0.10" stroke-width="1"/>

  <g mask="url(#m)">

    <!-- ── RUNGS (behind strands) ── -->
    <!-- Each rung spans from trough y≈91 to peak y≈309, at the quarter-period x positions -->
    <line x1="75"   y1="91" x2="75"   y2="309" stroke="#f5e040" stroke-opacity="0.16" stroke-width="1"/>
    <line x1="225"  y1="91" x2="225"  y2="309" stroke="#f5e040" stroke-opacity="0.16" stroke-width="1"/>
    <line x1="375"  y1="91" x2="375"  y2="309" stroke="#f5e040" stroke-opacity="0.16" stroke-width="1"/>
    <line x1="525"  y1="91" x2="525"  y2="309" stroke="#f5e040" stroke-opacity="0.16" stroke-width="1"/>
    <line x1="675"  y1="91" x2="675"  y2="309" stroke="#f5e040" stroke-opacity="0.16" stroke-width="1"/>
    <line x1="825"  y1="91" x2="825"  y2="309" stroke="#f5e040" stroke-opacity="0.16" stroke-width="1"/>
    <line x1="975"  y1="91" x2="975"  y2="309" stroke="#f5e040" stroke-opacity="0.16" stroke-width="1"/>
    <line x1="1125" y1="91" x2="1125" y2="309" stroke="#f5e040" stroke-opacity="0.16" stroke-width="1"/>

    <!-- ── STRAND 1 (gold, phase 0) ── -->
    <!-- Bezier: peaks DOWN (high y), troughs UP (low y) -->
    <path d="M 0,200 C 50,345 100,345 150,200 C 200,55 250,55 300,200 C 350,345 400,345 450,200 C 500,55 550,55 600,200 C 650,345 700,345 750,200 C 800,55 850,55 900,200 C 950,345 1000,345 1050,200 C 1100,55 1150,55 1200,200"
      fill="none" stroke="url(#sg1)" stroke-width="2.2" stroke-linecap="round" filter="url(#glow)"/>

    <!-- ── STRAND 2 (amber, phase π) ── -->
    <path d="M 0,200 C 50,55 100,55 150,200 C 200,345 250,345 300,200 C 350,55 400,55 450,200 C 500,345 550,345 600,200 C 650,55 700,55 750,200 C 800,345 850,345 900,200 C 950,55 1000,55 1050,200 C 1100,345 1150,345 1200,200"
      fill="none" stroke="url(#sg2)" stroke-width="2.2" stroke-linecap="round" filter="url(#glow)"/>

    <!-- ── STRAND 1 DOTS ── -->
    <!-- Quarter-period intermediates (smaller) -->
    <circle cx="37"   cy="282" r="2.8" fill="#f5e040" fill-opacity="0.75"/>
    <circle cx="112"  cy="282" r="2.8" fill="#f5e040" fill-opacity="0.75"/>
    <circle cx="187"  cy="118" r="2.8" fill="#f5e040" fill-opacity="0.75"/>
    <circle cx="262"  cy="118" r="2.8" fill="#f5e040" fill-opacity="0.75"/>
    <circle cx="337"  cy="282" r="2.8" fill="#f5e040" fill-opacity="0.75"/>
    <circle cx="412"  cy="282" r="2.8" fill="#f5e040" fill-opacity="0.75"/>
    <circle cx="487"  cy="118" r="2.8" fill="#f5e040" fill-opacity="0.75"/>
    <circle cx="562"  cy="118" r="2.8" fill="#f5e040" fill-opacity="0.75"/>
    <circle cx="637"  cy="282" r="2.8" fill="#f5e040" fill-opacity="0.75"/>
    <circle cx="712"  cy="282" r="2.8" fill="#f5e040" fill-opacity="0.75"/>
    <circle cx="787"  cy="118" r="2.8" fill="#f5e040" fill-opacity="0.75"/>
    <circle cx="862"  cy="118" r="2.8" fill="#f5e040" fill-opacity="0.75"/>
    <circle cx="937"  cy="282" r="2.8" fill="#f5e040" fill-opacity="0.75"/>
    <circle cx="1012" cy="282" r="2.8" fill="#f5e040" fill-opacity="0.75"/>
    <circle cx="1087" cy="118" r="2.8" fill="#f5e040" fill-opacity="0.75"/>
    <circle cx="1162" cy="118" r="2.8" fill="#f5e040" fill-opacity="0.75"/>
    <!-- Peaks (larger, glowing) -->
    <circle cx="75"   cy="309" r="5"   fill="#f5e040" filter="url(#dotglow)"/>
    <circle cx="225"  cy="91"  r="5"   fill="#f5e040" filter="url(#dotglow)"/>
    <circle cx="375"  cy="309" r="5"   fill="#f5e040" filter="url(#dotglow)"/>
    <circle cx="525"  cy="91"  r="5"   fill="#f5e040" filter="url(#dotglow)"/>
    <circle cx="675"  cy="309" r="5"   fill="#f5e040" filter="url(#dotglow)"/>
    <circle cx="825"  cy="91"  r="5"   fill="#f5e040" filter="url(#dotglow)"/>
    <circle cx="975"  cy="309" r="5"   fill="#f5e040" filter="url(#dotglow)"/>
    <circle cx="1125" cy="91"  r="5"   fill="#f5e040" filter="url(#dotglow)"/>

    <!-- ── STRAND 2 DOTS ── -->
    <circle cx="37"   cy="118" r="2.8" fill="#fbbf24" fill-opacity="0.75"/>
    <circle cx="112"  cy="118" r="2.8" fill="#fbbf24" fill-opacity="0.75"/>
    <circle cx="187"  cy="282" r="2.8" fill="#fbbf24" fill-opacity="0.75"/>
    <circle cx="262"  cy="282" r="2.8" fill="#fbbf24" fill-opacity="0.75"/>
    <circle cx="337"  cy="118" r="2.8" fill="#fbbf24" fill-opacity="0.75"/>
    <circle cx="412"  cy="118" r="2.8" fill="#fbbf24" fill-opacity="0.75"/>
    <circle cx="487"  cy="282" r="2.8" fill="#fbbf24" fill-opacity="0.75"/>
    <circle cx="562"  cy="282" r="2.8" fill="#fbbf24" fill-opacity="0.75"/>
    <circle cx="637"  cy="118" r="2.8" fill="#fbbf24" fill-opacity="0.75"/>
    <circle cx="712"  cy="118" r="2.8" fill="#fbbf24" fill-opacity="0.75"/>
    <circle cx="787"  cy="282" r="2.8" fill="#fbbf24" fill-opacity="0.75"/>
    <circle cx="862"  cy="282" r="2.8" fill="#fbbf24" fill-opacity="0.75"/>
    <circle cx="937"  cy="118" r="2.8" fill="#fbbf24" fill-opacity="0.75"/>
    <circle cx="1012" cy="118" r="2.8" fill="#fbbf24" fill-opacity="0.75"/>
    <circle cx="1087" cy="282" r="2.8" fill="#fbbf24" fill-opacity="0.75"/>
    <circle cx="1162" cy="282" r="2.8" fill="#fbbf24" fill-opacity="0.75"/>
    <!-- Peaks (larger, glowing) -->
    <circle cx="75"   cy="91"  r="5"   fill="#fbbf24" filter="url(#dotglow2)"/>
    <circle cx="225"  cy="309" r="5"   fill="#fbbf24" filter="url(#dotglow2)"/>
    <circle cx="375"  cy="91"  r="5"   fill="#fbbf24" filter="url(#dotglow2)"/>
    <circle cx="525"  cy="309" r="5"   fill="#fbbf24" filter="url(#dotglow2)"/>
    <circle cx="675"  cy="91"  r="5"   fill="#fbbf24" filter="url(#dotglow2)"/>
    <circle cx="825"  cy="309" r="5"   fill="#fbbf24" filter="url(#dotglow2)"/>
    <circle cx="975"  cy="91"  r="5"   fill="#fbbf24" filter="url(#dotglow2)"/>
    <circle cx="1125" cy="309" r="5"   fill="#fbbf24" filter="url(#dotglow2)"/>

    <!-- ── CROSSOVER DOTS (where strands meet at y=200) ── -->
    <circle cx="150"  cy="200" r="3.5" fill="#fef3c7" fill-opacity="0.65"/>
    <circle cx="300"  cy="200" r="3.5" fill="#fef3c7" fill-opacity="0.65"/>
    <circle cx="450"  cy="200" r="3.5" fill="#fef3c7" fill-opacity="0.65"/>
    <circle cx="600"  cy="200" r="3.5" fill="#fef3c7" fill-opacity="0.65"/>
    <circle cx="750"  cy="200" r="3.5" fill="#fef3c7" fill-opacity="0.65"/>
    <circle cx="900"  cy="200" r="3.5" fill="#fef3c7" fill-opacity="0.65"/>
    <circle cx="1050" cy="200" r="3.5" fill="#fef3c7" fill-opacity="0.65"/>

    <!-- ── RUNG MIDPOINT DOTS ── -->
    <circle cx="75"   cy="200" r="2.2" fill="white" fill-opacity="0.40"/>
    <circle cx="225"  cy="200" r="2.2" fill="white" fill-opacity="0.40"/>
    <circle cx="375"  cy="200" r="2.2" fill="white" fill-opacity="0.40"/>
    <circle cx="525"  cy="200" r="2.2" fill="white" fill-opacity="0.40"/>
    <circle cx="675"  cy="200" r="2.2" fill="white" fill-opacity="0.40"/>
    <circle cx="825"  cy="200" r="2.2" fill="white" fill-opacity="0.40"/>
    <circle cx="975"  cy="200" r="2.2" fill="white" fill-opacity="0.40"/>
    <circle cx="1125" cy="200" r="2.2" fill="white" fill-opacity="0.40"/>

  </g>

  <!-- Label -->
  <text x="600" y="378"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="11"
    fill="#f5e040"
    fill-opacity="0.28"
    letter-spacing="6">JADEN WONG · PORTFOLIO · 2026</text>
</svg>
