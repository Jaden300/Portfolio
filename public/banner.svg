  <!-- ── CHESS KING (centered x=600) ── -->

  <!-- Soft glow behind king -->
  <rect x="548" y="78" width="104" height="258" rx="12" fill="#f5e040" fill-opacity="0.07" filter="url(#bigGlow)"/>

  <!-- Cross — vertical bar -->
  <rect x="593" y="78" width="14" height="88" rx="5" fill="url(#kingGrad)" filter="url(#glow)"/>
