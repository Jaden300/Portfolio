  <!-- Base -->
  <rect x="520" y="312" width="160" height="24" rx="7" fill="url(#kingGrad)"/>

  <!-- Ground shadow -->
  <ellipse cx="600" cy="344" rx="90" ry="7" fill="#f5e040" fill-opacity="0.07"/>

  <!-- ── Label ── -->
  <text x="600" y="378"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="11"
    fill="#f5e040"
    fill-opacity="0.32"
    letter-spacing="5.5">JADEN WONG · PORTFOLIO · 2026</text>
